<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Barkbot - Meet a Dog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Chewy&family=Comic+Neue:wght@700&family=Inter:wght@400;600;800&family=Patrick+Hand&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --bg-color: #f3f4f6;
      --card-bg: rgba(255, 255, 255, 0.85);
      --text-main: #1f2937;
      --text-muted: #6b7280;
      --accent: #4f46e5;
      --accent-hover: #4338ca;
      --chat-user: #e0e7ff;
      --chat-bot: #f3f4f6;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg-color: #111827;
        --card-bg: rgba(31, 41, 55, 0.85);
        --text-main: #f9fafb;
        --text-muted: #9ca3af;
        --accent: #6366f1;
        --accent-hover: #818cf8;
        --chat-user: #3730a3;
        --chat-bot: #374151;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      padding: 20px;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .app-container {
      display: flex;
      flex-direction: row;
      gap: 24px;
      max-width: 1200px;
      width: 100%;
      height: calc(100vh - 40px);
    }
    @media (max-width: 767px) {
      body { height: auto; display: block; }
      .app-container { flex-direction: column; height: auto; min-height: 100vh; gap: 16px; }
    }
    .panel {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 24px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.1);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .profile-panel {
      flex: 1;
      overflow-y: auto;
      position: relative;
    }
    .chat-panel {
      flex: 1.5;
    }
    @media (max-width: 767px) {
      .profile-panel { height: 65vh; flex: none; }
      .chat-panel { height: 80vh; flex: none; }
    }
    
    /* Profile specific */
    .image-container {
      width: 100%;
      height: 300px;
      background-color: #e5e7eb;
      position: relative;
    }
    @media (prefers-color-scheme: dark) { .image-container { background-color: #374151; } }
    .profile-image { width: 100%; height: 100%; object-fit: cover; }
    
    .profile-content { padding: 24px; display: flex; flex-direction: column; }
    .header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
    .name { font-size: 2rem; font-weight: 800; letter-spacing: -0.02em; }
    .id-tag { color: var(--text-muted); font-weight: 600; font-size: 0.9rem; }
    
    .stats {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 16px 0;
    }
    .stat-box { background: rgba(0,0,0,0.04); padding: 12px; border-radius: 12px; }
    @media (prefers-color-scheme: dark) { .stat-box { background: rgba(255,255,255,0.05); } }
    .stat-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 4px; letter-spacing: 0.05em;}
    .stat-value { font-weight: 600; }
    
    /* Facts Animation Box */
    .facts-title { font-weight: 800; margin-top: 16px; margin-bottom: 8px; font-size: 1.1rem; }
    .facts-container {
      position: relative;
      height: 120px;
      overflow: hidden;
      background: rgba(0,0,0,0.03);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
    }
    @media (prefers-color-scheme: dark) { .facts-container { background: rgba(255,255,255,0.03); } }
    
    .fact-text {
      position: absolute;
      width: 100%;
      padding: 0 20px;
      text-align: center;
      opacity: 0;
      transform: translateX(100%);
      transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.6s ease;
      pointer-events: none;
    }
    .fact-text.active { opacity: 1; transform: translateX(0); }
    .fact-text.exit { opacity: 0; transform: translateX(-100%); }

    /* Playful Fonts */
    .font-1 { font-family: 'Caveat', cursive; font-size: 1.8rem; line-height: 1.2; }
    .font-2 { font-family: 'Comic Neue', cursive; font-size: 1.3rem; line-height: 1.3; }
    .font-3 { font-family: 'Patrick Hand', cursive; font-size: 1.45rem; line-height: 1.3; }
    .font-4 { font-family: 'Chewy', cursive; font-size: 1.3rem; line-height: 1.3; letter-spacing: 0.03em; }

    .pacc-link {
      display: inline-flex; align-items: center; gap: 6px;
      margin-top: auto; padding-top: 16px;
      color: var(--accent); font-weight: 600; text-decoration: none; font-size: 0.95rem;
    }
    .pacc-link:hover { text-decoration: underline; }

    /* Chat specific */
    .chat-header {
      padding: 16px 24px;
      border-bottom: 1px solid rgba(128,128,128,0.2);
      font-weight: 800;
      font-size: 1.2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .shuffle-btn {
      padding: 8px 16px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
    }
    .shuffle-btn:hover { background: var(--accent-hover); transform: translateY(-1px); }
    .shuffle-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .chat-history {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .message {
      max-width: 85%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 0.95rem;
      line-height: 1.5;
    }
    .message p {
      margin-bottom: 8px;
    }
    .message p:last-child {
      margin-bottom: 0;
    }
    .message strong {
      font-weight: 800;
    }
    .msg-user {
      align-self: flex-end;
      background: var(--chat-user);
      border-bottom-right-radius: 4px;
    }
    .msg-bot {
      align-self: flex-start;
      background: var(--chat-bot);
      border-bottom-left-radius: 4px;
    }
    
    /* Typing Indicator */
    .typing-indicator-container {
      align-self: flex-start;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-muted);
      font-size: 0.85rem;
      font-weight: 600;
      padding-left: 8px;
    }
    .typing-bubble {
      background: var(--chat-bot);
      padding: 12px 16px;
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      display: flex;
      gap: 4px;
      align-items: center;
      height: 40px;
    }
    .dot {
      width: 6px;
      height: 6px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out both;
    }
    .dot:nth-child(1) { animation-delay: -0.32s; }
    .dot:nth-child(2) { animation-delay: -0.16s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }

    .chat-input-area {
      padding: 16px 24px;
      border-top: 1px solid rgba(128,128,128,0.2);
      display: flex;
      gap: 12px;
    }
    .chat-input {
      flex: 1;
      padding: 14px 16px;
      border-radius: 24px;
      border: 1px solid rgba(128,128,128,0.3);
      background: transparent;
      color: var(--text-main);
      font-family: inherit;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .chat-input:focus { border-color: var(--accent); }
    .send-btn {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 50%;
      width: 48px;
      height: 48px;
      cursor: pointer;
      display: flex; justify-content: center; align-items: center;
      transition: background 0.2s;
    }
    .send-btn:hover { background: var(--accent-hover); }
    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .send-btn svg { width: 22px; height: 22px; fill: currentColor; }

    /* Loader */
    .loader {
      display: none; width: 48px; height: 48px;
      border: 5px solid rgba(0, 0, 0, 0.1); border-bottom-color: var(--accent);
      border-radius: 50%; box-sizing: border-box; animation: rotation 1s linear infinite;
      position: absolute; top: calc(50% - 24px); left: calc(50% - 24px); z-index: 10;
    }
    @media (prefers-color-scheme: dark) { .loader { border-color: rgba(255,255,255,0.1); border-bottom-color: var(--accent); } }
    @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .loading .profile-content { opacity: 0.3; pointer-events: none; }
    .loading .loader { display: block; }
  </style>
</head>
<body>

  <div class="app-container">
    <div class="panel profile-panel" id="profilePanel">
      <span class="loader" id="loader"></span>
      <div class="image-container">
        <img id="dogImage" class="profile-image" src="" alt="">
      </div>
      <div class="profile-content">
        <div class="header">
          <h1 class="name" id="dogName">Loading...</h1>
          <span class="id-tag" id="dogId"></span>
        </div>
        
        <div class="stats">
          <div class="stat-box">
            <div class="stat-label">Age</div>
            <div class="stat-value" id="dogAge">-</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">Weight</div>
            <div class="stat-value" id="dogWeight">-</div>
          </div>
        </div>

        <h3 class="facts-title">Important Facts</h3>
        <div class="facts-container" id="dogFactContainer"></div>

        <a href="#" target="_blank" class="pacc-link" id="paccLink" style="display:none;">
          View Official PACC Profile
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
        </a>
      </div>
    </div>

    <div class="panel chat-panel">
      <div class="chat-header">
        <span>Chat with <span id="chatTitleName">...</span></span>
        <button class="shuffle-btn" id="nextBtn">Shuffle Dog</button>
      </div>
      <div class="chat-history" id="chatHistory">
        <!-- Messages go here -->
      </div>
      <div class="chat-input-area">
        <input type="text" class="chat-input" id="chatInput" placeholder="Say hi..." disabled />
        <button class="send-btn" id="sendBtn" disabled>
          <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>
  </div>

  <script>
    let viewedIds = [];
    let currentAnimalId = null;
    let conversationHistory = [];
    let factInterval = null;
    let currentDogName = 'this dog';

    // Configure marked options to be safe
    marked.setOptions({
      breaks: true,
      gfm: true,
      headerIds: false
    });

    const profilePanel = document.getElementById('profilePanel');
    const loader = document.getElementById('loader');
    const dogImage = document.getElementById('dogImage');
    const dogName = document.getElementById('dogName');
    const dogId = document.getElementById('dogId');
    const dogAge = document.getElementById('dogAge');
    const dogWeight = document.getElementById('dogWeight');
    const dogFactContainer = document.getElementById('dogFactContainer');
    const paccLink = document.getElementById('paccLink');
    const nextBtn = document.getElementById('nextBtn');
    
    const chatTitleName = document.getElementById('chatTitleName');
    const chatHistory = document.getElementById('chatHistory');
    const chatInput = document.getElementById('chatInput');
    const sendBtn = document.getElementById('sendBtn');

    function stopFactsAnimation() {
      if (factInterval) clearInterval(factInterval);
      dogFactContainer.innerHTML = '';
    }

    function startFactsAnimation(facts) {
      stopFactsAnimation();
      
      if (!facts || facts.length === 0) {
        dogFactContainer.innerHTML = '<div class="fact-text active font-1">Ask me anything in the chat!</div>';
        return;
      }

      const els = facts.map((f, i) => {
        const el = document.createElement('div');
        const fontClass = 'font-' + ((i % 4) + 1);
        el.className = `fact-text ${fontClass}`;
        el.textContent = f;
        dogFactContainer.appendChild(el);
        return el;
      });

      let currentIndex = 0;
      els[0].classList.add('active');

      if (facts.length > 1) {
        factInterval = setInterval(() => {
          const currentEl = els[currentIndex];
          const nextIndex = (currentIndex + 1) % facts.length;
          const nextEl = els[nextIndex];

          currentEl.classList.remove('active');
          currentEl.classList.add('exit');

          nextEl.style.transition = 'none';
          nextEl.classList.remove('active', 'exit');
          void nextEl.offsetWidth; // Force CSS flush
          
          nextEl.style.transition = '';
          nextEl.classList.add('active');

          currentIndex = nextIndex;
        }, 4000); // 4 seconds per fact
      }
    }

    async function fetchRandomDog() {
      // Clear current state instantly to prevent lagging info
      dogImage.src = '';
      dogName.textContent = 'Loading...';
      dogId.textContent = '';
      dogAge.textContent = '-';
      dogWeight.textContent = '-';
      stopFactsAnimation();
      paccLink.style.display = 'none';
      chatTitleName.textContent = '...';
      currentDogName = 'this dog';
      chatHistory.innerHTML = '';
      conversationHistory = [];
      chatInput.disabled = true;
      sendBtn.disabled = true;

      profilePanel.classList.add('loading');

      try {
        const viewedParam = viewedIds.length > 0 ? '?viewed=' + viewedIds.join(',') : '';
        const response = await fetch('/api/random_dog' + viewedParam);
        if (!response.ok) throw new Error('Failed to fetch a dog.');
        
        const dog = await response.json();
        
        currentAnimalId = dog.animal_id;
        if (currentAnimalId && !viewedIds.includes(currentAnimalId)) {
          viewedIds.push(currentAnimalId);
        }

        currentDogName = dog.name || 'this dog';
        dogName.textContent = dog.name || 'Unknown';
        chatTitleName.textContent = currentDogName;
        dogId.textContent = dog.animal_id || '';
        dogAge.textContent = dog.age || 'Unknown';
        dogWeight.textContent = dog.weight || 'Unknown';

        startFactsAnimation(dog.important_facts || []);

        if (dog.url) {
          paccLink.href = dog.url;
          paccLink.style.display = 'inline-flex';
        }

        // Handle Image
        if (dog.image_file && dog.image_base_url) {
          dogImage.src = dog.image_base_url + dog.image_file;
        } else if (dog.image_public_url) {
          dogImage.src = dog.image_public_url;
        } else if (dog.image_url) {
          dogImage.src = dog.image_url;
        }

        chatInput.disabled = false;
        sendBtn.disabled = false;
        
        appendMessage('bot', `Hi there! I'm ${dog.name}. Ask me anything about my ideal home or my favorite things!`);

      } catch (err) {
        console.error(err);
        dogName.textContent = 'Oops!';
        startFactsAnimation(['Could not load a random dog. Please try again.']);
      } finally {
        profilePanel.classList.remove('loading');
      }
    }

    function appendMessage(role, content) {
      const msgDiv = document.createElement('div');
      msgDiv.className = `message msg-${role}`;
      
      if (role === 'bot') {
        msgDiv.innerHTML = marked.parse(content);
      } else {
        msgDiv.textContent = content;
      }
      
      chatHistory.appendChild(msgDiv);
      chatHistory.scrollTop = chatHistory.scrollHeight;
      
      // Add to internal history state
      conversationHistory.push({ role: role === 'bot' ? 'assistant' : 'user', content });
    }

    function showTypingIndicator() {
      const container = document.createElement('div');
      container.className = 'typing-indicator-container';
      container.id = 'typingIndicator';
      
      const bubble = document.createElement('div');
      bubble.className = 'typing-bubble';
      bubble.innerHTML = '<span class="dot"></span><span class="dot"></span><span class="dot"></span>';
      
      const text = document.createElement('span');
      text.textContent = `${currentDogName} is typing...`;
      
      container.appendChild(bubble);
      container.appendChild(text);
      
      chatHistory.appendChild(container);
      chatHistory.scrollTop = chatHistory.scrollHeight;
    }

    function removeTypingIndicator() {
      const indicator = document.getElementById('typingIndicator');
      if (indicator) {
        indicator.remove();
      }
    }

    async function sendMessage() {
      const text = chatInput.value.trim();
      if (!text || !currentAnimalId) return;

      appendMessage('user', text);
      chatInput.value = '';
      chatInput.disabled = true;
      sendBtn.disabled = true;
      
      showTypingIndicator();

      const historyToSend = conversationHistory.slice(0, -1);

      try {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            animal_id: currentAnimalId,
            message: text,
            conversation_history: historyToSend
          })
        });

        removeTypingIndicator();

        if (!response.ok) throw new Error('Chat failed');

        const data = await response.json();
        if (data.reply) {
          appendMessage('bot', data.reply);
        } else {
          appendMessage('bot', '[Error: No reply received]');
        }
      } catch (err) {
        removeTypingIndicator();
        console.error(err);
        appendMessage('bot', '[Sorry, I had trouble responding to that.]');
      } finally {
        chatInput.disabled = false;
        sendBtn.disabled = false;
        chatInput.focus();
      }
    }

    nextBtn.addEventListener('click', fetchRandomDog);
    sendBtn.addEventListener('click', sendMessage);
    chatInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    // Initial fetch
    fetchRandomDog();
  </script>
</body>
</html>
